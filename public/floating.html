<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>今日聚焦</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1c1814;
  --bg2: #231f19;
  --bg3: #2d2820;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ece8;
  --text2: #9a9a9a;
  --text3: #585858;
  --accent: #cc785c;
  --accent-light: #e8956e;
  --accent-bg: rgba(204,120,92,0.13);
  --p1: #e06060; --p2: #c8884a; --p3: #7096c8; --p4: #6a6a6a;
  --success: #52a470; --warning: #c89240; --danger: #d45050;
  --r: 8px;
}
html, body {
  height: 100%; background: transparent;
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  font-size: 13px; overflow: hidden;
  -webkit-font-smoothing: antialiased;
  user-select: none;
}
#app {
  display: flex; flex-direction: column; height: 100vh;
  background: var(--bg);
  border: 1px solid rgba(204,120,92,0.22);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.75), 0 0 0 1px rgba(204,120,92,0.08);
}

/* ── MAIN CONTENT (hidden when collapsed) ── */
#main-content {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
  pointer-events: none;
  min-height: 0;
}
#app.expanded #main-content {
  opacity: 1; transform: translateY(0); pointer-events: auto;
}

/* Inner header */
#inner-header {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 12px 8px;
  background: linear-gradient(180deg, rgba(204,120,92,0.07) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  -webkit-app-region: drag;
}
.ih-title { font-size: 12px; font-weight: 700; color: var(--text); flex: 1; letter-spacing: 0.2px; }
.ih-date { font-size: 10px; color: var(--text3); }
.ih-btn {
  width: 22px; height: 22px; border-radius: 6px; border: none;
  background: transparent; color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all 0.12s; -webkit-app-region: no-drag;
}
.ih-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

/* CONTENT */
#content { flex: 1; overflow-y: auto; padding: 4px 7px 4px; min-height: 0; }
#content::-webkit-scrollbar { width: 3px; }
#content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* SECTION HEADER */
.sec-header {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 4px 3px; cursor: pointer; -webkit-app-region: no-drag;
}
.sec-header:hover .sec-title { color: var(--text2); }
.sec-icon { font-size: 10px; transition: transform 0.15s; color: var(--text3); }
.sec-icon.collapsed { transform: rotate(-90deg); }
.sec-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text3); flex: 1; }
.sec-count {
  font-size: 10px; padding: 1px 6px; border-radius: 999px;
  background: rgba(255,255,255,0.07); color: var(--text3);
}
.sec-today .sec-count { background: var(--accent-bg); color: var(--accent-light); }
.sec-done .sec-count { background: rgba(82,164,112,0.12); color: var(--success); }
.sec-overdue .sec-title { color: var(--warning); }
.sec-overdue .sec-count { background: rgba(200,146,64,0.12); color: var(--warning); }
.sec-body { overflow: hidden; transition: max-height 0.2s ease; }
.sec-body.collapsed { max-height: 0 !important; }

/* TODO ITEM */
.todo-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: var(--r); cursor: default;
  transition: background 0.08s; margin-bottom: 1px;
  position: relative;
}
.todo-item:hover { background: rgba(255,255,255,0.04); }
.todo-item:hover .snooze-btn { opacity: 1; }
.todo-item.done-item { opacity: 0.35; }
.chk {
  width: 15px; height: 15px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.13s; position: relative;
}
.chk:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(204,120,92,0.2); }
.chk.done { background: var(--success); border-color: var(--success); }
.chk.done::after {
  content: ''; position: absolute;
  width: 4px; height: 7px;
  border-right: 1.5px solid #fff; border-bottom: 1.5px solid #fff;
  transform: rotate(45deg) translate(-0.5px, -1px);
}
.p1c { border-color: var(--p1) !important; }
.p2c { border-color: var(--p2) !important; }
.p3c { border-color: var(--p3) !important; }
.ti-body { flex: 1; min-width: 0; }
.ti-title {
  font-size: 12px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4;
}
.done-item .ti-title { text-decoration: line-through; color: var(--text3); }
.ti-meta { display: flex; gap: 4px; align-items: center; margin-top: 1px; }
.ti-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.ti-time { font-size: 10px; color: var(--text3); }
.ti-time.ov { color: var(--danger); }
.snooze-btn {
  opacity: 0; width: 20px; height: 20px; border-radius: 5px; border: none;
  background: transparent; color: var(--text3); cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.1s, background 0.1s; flex-shrink: 0;
  -webkit-app-region: no-drag;
}
.snooze-btn:hover { background: rgba(255,255,255,0.08); color: var(--warning); }

/* EMPTY */
.empty { padding: 14px 8px; text-align: center; color: var(--text3); font-size: 11px; }
.empty-icon { font-size: 20px; margin-bottom: 4px; opacity: 0.5; }

/* ADD TASK AREA */
#add-area { border-top: 1px solid var(--border); flex-shrink: 0; -webkit-app-region: no-drag; }
#add-toggle {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 10px; cursor: pointer;
  font-size: 11px; color: var(--text3); transition: color 0.1s;
}
#add-toggle:hover { color: var(--accent-light); }
#add-toggle-icon { font-size: 14px; font-weight: 300; transition: transform 0.15s; display: inline-block; }
#add-toggle-icon.open { transform: rotate(45deg); }
#add-form { padding: 0 8px 8px; display: none; }
#add-form.open { display: block; }
.add-title-input {
  width: 100%; padding: 7px 9px; border-radius: var(--r);
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); font-size: 12px; outline: none; margin-bottom: 6px;
}
.add-title-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(204,120,92,0.18); }
.add-title-input::placeholder { color: var(--text3); }
.add-row { display: flex; gap: 6px; align-items: center; }
.add-dt {
  flex: 1; padding: 6px 8px; border-radius: var(--r);
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); font-size: 11px; outline: none; color-scheme: dark;
}
.add-dt:focus { border-color: var(--accent); }
.add-prio {
  padding: 6px 8px; border-radius: var(--r);
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); font-size: 11px; outline: none;
}
.add-btn {
  padding: 6px 12px; border-radius: var(--r); border: none;
  background: var(--accent); color: white; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background 0.1s; white-space: nowrap;
}
.add-btn:hover { background: var(--accent-light); }

/* ── PEEK STRIP (always visible at bottom) ── */
#peek-strip {
  height: 50px; flex-shrink: 0; display: flex; align-items: center; gap: 8px;
  padding: 0 10px;
  background: linear-gradient(0deg, rgba(204,120,92,0.06) 0%, transparent 100%);
  border-top: 1px solid rgba(204,120,92,0.18);
  -webkit-app-region: drag;
}
.ps-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  box-shadow: 0 0 6px rgba(204,120,92,0.5);
  transition: transform 0.15s;
}
#app.expanded .ps-dot { transform: scale(1.2); }
.ps-count {
  font-size: 11px; font-weight: 700; color: var(--accent-light); flex-shrink: 0;
  min-width: 16px; text-align: center;
}
.ps-label { font-size: 10px; color: var(--text3); flex-shrink: 0; letter-spacing: 0.3px; }
#ps-opacity {
  flex: 1; height: 3px; -webkit-appearance: none;
  background: rgba(255,255,255,0.1); border-radius: 3px; outline: none; cursor: pointer;
  -webkit-app-region: no-drag;
}
#ps-opacity::-webkit-slider-thumb {
  -webkit-appearance: none; width: 11px; height: 11px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
  box-shadow: 0 0 4px rgba(204,120,92,0.5);
}
.ps-val { font-size: 9px; color: var(--text3); width: 24px; text-align: right; flex-shrink: 0; }
.ps-btn {
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: transparent; color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all 0.12s; flex-shrink: 0;
  -webkit-app-region: no-drag;
}
.ps-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.ps-btn.pinned { color: var(--accent); }
.ps-close:hover { background: rgba(212,80,80,0.18); color: var(--danger); }

/* Animations */
@keyframes chkPop { 0%{transform:scale(0.6)} 50%{transform:scale(1.3)} 80%{transform:scale(0.9)} 100%{transform:scale(1)} }
.chk-pop { animation: chkPop 0.22s ease; }
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.slide-in { animation: slideDown 0.16s ease; }
</style>
</head>
<body>
<div id="app">
  <!-- MAIN CONTENT (shows when expanded) -->
  <div id="main-content">
    <div id="inner-header" id="titlebar">
      <div class="ih-title">今日聚焦</div>
      <div class="ih-date" id="date-disp"></div>
      <button class="ih-btn" onclick="refresh()" title="刷新">↺</button>
    </div>

    <div id="content">
      <!-- Today pending -->
      <div class="sec-header sec-today" onclick="toggleSec('today')">
        <span class="sec-icon" id="ic-today">▾</span>
        <span class="sec-title">今天</span>
        <span class="sec-count" id="cnt-today">0</span>
      </div>
      <div class="sec-body" id="bd-today" style="max-height:600px"></div>

      <!-- Overdue -->
      <div class="sec-header sec-overdue" id="hd-overdue" style="display:none" onclick="toggleSec('overdue')">
        <span class="sec-icon" id="ic-overdue">▾</span>
        <span class="sec-title">⚠ 逾期</span>
        <span class="sec-count" id="cnt-overdue">0</span>
      </div>
      <div class="sec-body" id="bd-overdue" style="max-height:600px"></div>

      <!-- Done today (collapsed) -->
      <div class="sec-header sec-done" onclick="toggleSec('done')">
        <span class="sec-icon collapsed" id="ic-done">▾</span>
        <span class="sec-title">今日已完成</span>
        <span class="sec-count" id="cnt-done">0</span>
      </div>
      <div class="sec-body collapsed" id="bd-done" style="max-height:0"></div>
    </div>

    <!-- ADD TASK -->
    <div id="add-area">
      <div id="add-toggle" onclick="toggleAddForm()">
        <span id="add-toggle-icon">+</span>
        <span>添加定时任务</span>
      </div>
      <div id="add-form">
        <input class="add-title-input" id="add-title" placeholder="任务标题…" maxlength="200"
          onkeydown="if(event.key==='Enter')submitAdd()">
        <div class="add-row">
          <input class="add-dt" id="add-dt" type="datetime-local">
          <select class="add-prio" id="add-prio">
            <option value="p1">🔴 P1</option>
            <option value="p2">🟠 P2</option>
            <option value="p3" selected>🔵 P3</option>
            <option value="p4">⚪ P4</option>
          </select>
          <button class="add-btn" onclick="submitAdd()">添加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- PEEK STRIP (always visible) -->
  <div id="peek-strip">
    <div class="ps-dot"></div>
    <span class="ps-count" id="ps-cnt">0</span>
    <span class="ps-label">待办</span>
    <input type="range" id="ps-opacity" min="25" max="100" value="92"
      oninput="setOpacity(this.value)">
    <span class="ps-val" id="ps-val">92%</span>
    <button class="ps-btn" id="pin-btn" onclick="togglePin()" title="固定展开">📌</button>
    <button class="ps-btn ps-close" onclick="closeWin()" title="关闭">✕</button>
  </div>
</div>

<script>
const PC = { p1:'var(--p1)', p2:'var(--p2)', p3:'var(--p3)', p4:'var(--p4)' };
const PCC = { p1:'p1c', p2:'p2c', p3:'p3c', p4:'' };
let todos = [];
let secState = { today: true, overdue: true, done: false };
let currentDate = ds(new Date());
let isPinned = false;
let isExpanded = false;
let collapseTimer = null;

function ds(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(d) {
  return d.toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

async function apiFetch(url, opts={}) {
  const r = await fetch(url,{headers:{'Content-Type':'application/json'},...opts});
  return r.json();
}

async function refresh() {
  try {
    todos = await apiFetch('/api/todos');
    render();
  } catch {
    document.getElementById('bd-today').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>无法连接服务</div>';
  }
}

function getTodayPending() {
  const today = ds(new Date());
  return todos.filter(t => !t.parentId && !t.completed && t.dueDate && ds(new Date(t.dueDate)) === today);
}
function getOverdue() {
  const today = ds(new Date());
  return todos.filter(t => {
    if (t.parentId || t.completed || !t.dueDate) return false;
    return ds(new Date(t.dueDate)) < today;
  });
}
function getDoneToday() {
  const today = ds(new Date());
  return todos.filter(t => {
    if (t.parentId) return false;
    if (t.completedAt && ds(new Date(t.completedAt)) === today) return true;
    if (t.lastCompletedAt && ds(new Date(t.lastCompletedAt)) === today) return true;
    return false;
  });
}
function sortByPriority(arr) {
  const rank = {p1:0,p2:1,p3:2,p4:3};
  return [...arr].sort((a,b)=>{
    const ra=rank[a.priority]??2, rb=rank[b.priority]??2;
    if(ra!==rb) return ra-rb;
    if(a.dueDate&&b.dueDate) return new Date(a.dueDate)-new Date(b.dueDate);
    return 0;
  });
}

function itemHtml(t) {
  const due = t.dueDate ? new Date(t.dueDate) : null;
  const now = new Date();
  const isOv = due && due < now && !t.completed;
  const p = t.priority || 'p3';
  return `<div class="todo-item${t.completed?' done-item':''} slide-in" data-id="${t.id}">
    <div class="chk${t.completed?' done':' '+PCC[p]}" onclick="toggle('${t.id}',event)"></div>
    <div class="ti-body">
      <div class="ti-title" title="${esc(t.title)}">${esc(t.title)}</div>
      ${due?`<div class="ti-meta"><div class="ti-dot" style="background:${PC[p]}"></div><span class="ti-time${isOv?' ov':''}">${fmtTime(due)}${isOv?' 逾期':''}</span></div>`:''}
    </div>
    ${!t.completed?`<button class="snooze-btn" onclick="snooze('${t.id}',event)" title="推迟1小时">⏱</button>`:''}
  </div>`;
}

function render() {
  const pending = sortByPriority(getTodayPending());
  const overdue = sortByPriority(getOverdue());
  const done = getDoneToday();
  const totalPending = pending.length + overdue.length;

  document.getElementById('cnt-today').textContent = pending.length;
  document.getElementById('bd-today').innerHTML = pending.length
    ? pending.map(itemHtml).join('')
    : '<div class="empty"><div class="empty-icon">✅</div>今天没有待办</div>';

  const ovHd = document.getElementById('hd-overdue');
  ovHd.style.display = overdue.length ? '' : 'none';
  document.getElementById('cnt-overdue').textContent = overdue.length;
  document.getElementById('bd-overdue').innerHTML = overdue.map(itemHtml).join('');

  document.getElementById('cnt-done').textContent = done.length;
  document.getElementById('bd-done').innerHTML = done.length
    ? done.map(itemHtml).join('')
    : '<div class="empty">今日暂无完成记录</div>';

  // Update peek strip count
  document.getElementById('ps-cnt').textContent = totalPending;
}

function toggleSec(key) {
  secState[key] = !secState[key];
  const ic = document.getElementById('ic-'+key);
  const bd = document.getElementById('bd-'+key);
  if (secState[key]) {
    ic.classList.remove('collapsed');
    bd.style.maxHeight = bd.scrollHeight + 600 + 'px';
    bd.classList.remove('collapsed');
  } else {
    ic.classList.add('collapsed');
    bd.style.maxHeight = '0';
    bd.classList.add('collapsed');
  }
}

async function toggle(id, e) {
  e.stopPropagation();
  const t = todos.find(x=>x.id===id); if(!t) return;
  const chk = e.currentTarget;
  chk.classList.add('chk-pop');
  setTimeout(()=>chk.classList.remove('chk-pop'), 220);
  try {
    const res = await apiFetch(`/api/todos/${id}`,{method:'PUT',body:JSON.stringify({completed:!t.completed})});
    const i = todos.findIndex(x=>x.id===id);
    if(i!==-1) todos[i]=res;
    render();
    if(!t.completed && !secState.done) toggleSec('done');
  } catch {}
}

async function snooze(id, e) {
  e.stopPropagation();
  const t = todos.find(x=>x.id===id); if(!t) return;
  const newDue = new Date(Date.now() + 3600000).toISOString();
  try {
    const res = await apiFetch(`/api/todos/${id}`,{method:'PUT',body:JSON.stringify({dueDate:newDue})});
    const i = todos.findIndex(x=>x.id===id);
    if(i!==-1) todos[i]=res;
    render();
  } catch {}
}

// Opacity
function setOpacity(val) {
  const v = Math.max(25, Math.min(100, parseInt(val)));
  document.getElementById('ps-val').textContent = v + '%';
  document.getElementById('app').style.opacity = v / 100;
  if (window.floatingBridge?.setOpacity) window.floatingBridge.setOpacity(v / 100);
}

// Expand / collapse
function doExpand() {
  if (isExpanded) return;
  isExpanded = true;
  document.getElementById('app').classList.add('expanded');
  window.floatingBridge?.expand?.(true);
  refresh();
}
function doCollapse() {
  if (!isExpanded || isPinned) return;
  isExpanded = false;
  document.getElementById('app').classList.remove('expanded');
  setTimeout(() => {
    if (!isExpanded) window.floatingBridge?.expand?.(false);
  }, 180);
}

function togglePin() {
  isPinned = !isPinned;
  const btn = document.getElementById('pin-btn');
  btn.classList.toggle('pinned', isPinned);
  btn.title = isPinned ? '取消固定' : '固定展开';
  if (isPinned) doExpand();
}

document.addEventListener('mouseenter', () => {
  clearTimeout(collapseTimer);
  doExpand();
});
document.addEventListener('mouseleave', () => {
  collapseTimer = setTimeout(doCollapse, 900);
});

// Add form
function toggleAddForm() {
  const form = document.getElementById('add-form');
  const icon = document.getElementById('add-toggle-icon');
  const open = form.classList.toggle('open');
  icon.classList.toggle('open', open);
  if (open) {
    const d = new Date(); d.setHours(d.getHours()+1,0,0,0);
    const pad = n=>String(n).padStart(2,'0');
    document.getElementById('add-dt').value =
      `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:00`;
    setTimeout(()=>document.getElementById('add-title').focus(), 50);
  }
}

async function submitAdd() {
  const title = document.getElementById('add-title').value.trim();
  const dt = document.getElementById('add-dt').value;
  const prio = document.getElementById('add-prio').value;
  if (!title) { document.getElementById('add-title').focus(); return; }
  try {
    const t = await apiFetch('/api/todos',{method:'POST',body:JSON.stringify({
      title, priority: prio,
      dueDate: dt ? new Date(dt).toISOString() : new Date(Date.now()+3600000).toISOString(),
    })});
    todos.unshift(t);
    render();
    document.getElementById('add-title').value = '';
    toggleAddForm();
  } catch {}
}

function closeWin() {
  window.floatingBridge?.close();
}

// Date display & auto-refresh
function tick() {
  const now = new Date();
  const nd = ds(now);
  if (nd !== currentDate) { currentDate = nd; refresh(); }
  const days=['日','一','二','三','四','五','六'];
  document.getElementById('date-disp').textContent =
    `${now.getMonth()+1}/${now.getDate()} 周${days[now.getDay()]}`;
}

tick();
refresh();
setInterval(tick, 30000);
setInterval(refresh, 10000);

// Real-time push
if (window.floatingBridge?.onTodosChanged) {
  window.floatingBridge.onTodosChanged(() => refresh());
}
</script>
</body>
</html>
