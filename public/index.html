// ===== CHINESE DATETIME NLP =====
function parseChineseDateTimeFromText(text) {
  const CN_NUM = {'零':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'两':2};
  function parseCNorArabic(s) {
    if (!s || !s.length) return 0;
    const n = parseInt(s, 10); if (!isNaN(n)) return n;
    let result = 0, cur = 0;
    for (const ch of s) {
      const v = CN_NUM[ch]; if (v === undefined) return null;
      if (v === 10) { result += (cur || 1) * 10; cur = 0; } else cur = v;
    }
    return result + cur;
  }

  const now = new Date();
  let hasDay = false, baseDate = new Date(now);

  // Day modifiers
  const dayM = text.match(/(大后天|后天|明天|明日|今天|今日)/);
  if (dayM) {
    hasDay = true;
    if (dayM[1] === '大后天') baseDate.setDate(baseDate.getDate() + 3);
    else if (dayM[1] === '后天') baseDate.setDate(baseDate.getDate() + 2);
    else if (/明天|明日/.test(dayM[1])) baseDate.setDate(baseDate.getDate() + 1);
    text = text.replace(dayM[0], '');
  }

  // Time period
  let forcePM = false, forceAM = false;
  const periodM = text.match(/(下午|傍晚|晚上|夜晚|夜里|午后|中午|上午|早上|早晨|凌晨)/);
  if (periodM) {
    if (/下午|傍晚|晚上|夜晚|夜里|午后|中午/.test(periodM[1])) forcePM = true;
    else forceAM = true;
    text = text.replace(periodM[0], '');
  }

  // 九点半 = 9:30
  const halfM = text.match(/([零一二三四五六七八九十两\d]+)[点时]半/);
  if (halfM) {
    const h = parseCNorArabic(halfM[1]);
    if (h !== null) {
      let hours = h;
      if (forcePM && hours < 12) hours += 12;
      if (forceAM && hours === 12) hours = 0;
      if (!forcePM && !forceAM && hours >= 1 && hours <= 7) hours += 12;
      baseDate.setHours(hours, 30, 0, 0);
      if (!hasDay && baseDate <= now) baseDate.setDate(baseDate.getDate() + 1);
      return { cleanText: text.replace(halfM[0], '').replace(/^\s+|\s+$/g, ''), date: baseDate };
    }
  }

  // 九点三十 / 9点30 / 九点 / 9时30分
  const timeM = text.match(/([零一二三四五六七八九十两\d]+)[点时]([零一二三四五六七八九十\d]*)[分]?/);
  if (timeM) {
    const h = parseCNorArabic(timeM[1]);
    const m = timeM[2] ? (parseCNorArabic(timeM[2]) || 0) : 0;
    if (h !== null) {
      let hours = h;
      if (forcePM && hours < 12) hours += 12;
      if (forceAM && hours === 12) hours = 0;
      if (!forcePM && !forceAM && hours >= 1 && hours <= 7) hours += 12;
      baseDate.setHours(hours, m, 0, 0);
      if (!hasDay && baseDate <= now) baseDate.setDate(baseDate.getDate() + 1);
      return { cleanText: text.replace(timeM[0], '').replace(/^\s+|\s+$/g, ''), date: baseDate };
    }
  }

  return { cleanText: text, date: null };
}

function parseQuickAddInput(raw) {
  let text = String(raw || '').trim();
  const meta = {};

  const priorityMatch = text.match(/(?:^|\s)p([1-4])(?:\s|$)/i);
  if (priorityMatch) {
    meta.priority = `p${priorityMatch[1]}`;
    text = text.replace(/(?:^|\s)p[1-4](?=\s|$)/ig, ' ');
  }

  const tagSet = new Set();
  text = text.replace(/(^|\s)#([^\s#]+)/g, (full, lead, tag) => {
    if (tag) tagSet.add(tag.trim());
    return lead || ' ';
  });
  if (tagSet.size) meta.tags = [...tagSet];

  // Chinese datetime NLP (before keyword check so "今天" doesn't conflict)
  const nlpResult = parseChineseDateTimeFromText(text);
  if (nlpResult.date) {
    meta.dueDate = nlpResult.date.toISOString();
    text = nlpResult.cleanText;
  } else if (/(?:^|\s)(?:!today|\/today|今天)(?:\s|$)/i.test(text)) {
    meta.dueDate = nextHourDate().toISOString();
    text = text.replace(/(?:^|\s)(?:!today|\/today|今天)(?=\s|$)/ig, ' ');
  }

  if (/(?:^|\s)(?:!doing|\/doing|进行中)(?:\s|$)/i.test(text)) {
    meta.status = 'doing';
    text = text.replace(/(?:^|\s)(?:!doing|\/doing|进行中)(?=\s|$)/ig, ' ');
  }

  const title = text.replace(/\s+/g, ' ').trim() || String(raw || '').trim();
  return { title, meta };
}
async function quickAdd() {
  const inp = document.getElementById('quick-input');
  const rawInput = inp?.value?.trim();
  if (!rawInput) return;
  inp.value = '';

  const parsed = parseQuickAddInput(rawInput);
  const quickData = { title: parsed.title, ...parsed.meta };
  if (S.list === 'today' && !quickData.dueDate) quickData.dueDate = nextHourDate().toISOString();
  if (S.list.startsWith('tag:')) {
    quickData.tags = [...new Set([...(quickData.tags || []), S.list.slice(4)])];
  }

  const t = await createTodo(quickData);
  toast('已添加', S.list === 'today' || quickData.dueDate ? `${t.title} · 已放入今天` : t.title, 'success');
  selectTodo(t.id);
}

// ===== MODAL =====
let modalMode = 'create', modalInitStatus = 'todo';
function openAddModal(preStatus = 'todo') {
  modalMode = 'create'; S.editingId = null; modalInitStatus = preStatus;
  document.getElementById('modal-title-text').textContent = '新建待办';
  document.getElementById('modal-submit-btn').textContent = '创建';
  document.getElementById('m-title').value = '';
  document.getElementById('m-desc').value = '';
  const defaultDue = S.list === 'today' ? toInputDT(nextHourDate()) : '';
  document.getElementById('m-due').value = defaultDue;
  document.getElementById('m-priority').value = S.list === 'today' ? 'p2' : 'p3';
  document.getElementById('m-recur').value = '';
  document.getElementById('m-remind').value = '30';
  document.getElementById('m-tags').value = S.list.startsWith('tag:') ? S.list.slice(4) : '';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('m-title')?.focus(), 50);
}
function openEditModal(id) {
  const t = S.todos.find(x => x.id === id); if (!t) return;
  modalMode = 'edit'; S.editingId = id;
  document.getElementById('modal-title-text').textContent = '编辑待办';
  document.getElementById('modal-submit-btn').textContent = '保存';
  document.getElementById('m-title').value = t.title;
  document.getElementById('m-desc').value = t.description || '';
  document.getElementById('m-due').value = t.dueDate ? t.dueDate.slice(0,16) : '';
  document.getElementById('m-priority').value = t.priority || 'p3';
  document.getElementById('m-recur').value = t.recurrence || '';
  document.getElementById('m-remind').value = t.reminderMinutes ?? 30;
  document.getElementById('m-tags').value = (t.tags||[]).join(', ');
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('m-title')?.focus(), 50);
}
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }
async function submitModal() {
  const title = document.getElementById('m-title').value.trim();
  if (!title) { document.getElementById('m-title').focus(); return; }
  const due = document.getElementById('m-due').value;
  const recurrence = document.getElementById('m-recur').value || null;
  const normalizedDue = normalizeDueValue(due, recurrence);
  if (recurrence && !due) toast('已自动补上开始时间', '循环任务需要一个起始时间，已为你设置为下一整点。', 'info');
  const data = {
    title,
    description: document.getElementById('m-desc').value,
    dueDate: normalizedDue,
    priority: document.getElementById('m-priority').value,
    recurrence,
    reminderMinutes: parseInt(document.getElementById('m-remind').value) || 30,
    tags: document.getElementById('m-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
  };
  closeModal();
  if (modalMode === 'edit' && S.editingId) {
    await updateTodo(S.editingId, data);
    toast('已更新', title, 'success');
    renderDetail();
  } else {
    data.status = modalInitStatus;
    const t = await createTodo(data);
    toast('已创建', title, 'success');
    selectTodo(t.id);
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeZeroCelebration();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openAddModal(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && S.dirty) { e.preventDefault(); saveDetail(); }
});
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal')) closeModal();
});
document.getElementById('m-title').addEventListener('keydown', e => { if (e.key === 'Enter') submitModal(); });

// ===== FLOATING WINDOW =====
async function toggleFloating() {
  if (!isDesktopRuntime()) {
    toast('浮窗仅在桌面版可用', '', 'info');
    return;
  }
  const result = await window.desktopBridge.toggleFloating();
  updateFloatingBtn(result?.visible);
}
function updateFloatingBtn(visible) {
  const btn = document.getElementById('floating-btn');
  if (btn) btn.classList.toggle('active', Boolean(visible));
}
async function initFloatingBtnState() {
  if (!isDesktopRuntime()) return;
  try {
    const result = await window.desktopBridge.isFloatingVisible();
    updateFloatingBtn(result?.visible);
    window.desktopBridge.onFloatingState(visible => updateFloatingBtn(visible));
  } catch {}
}

// ===== REMINDERS =====
function isDesktopRuntime() {
  return Boolean(window.desktopBridge?.isDesktop);
}
async function pushReminderToDesktop(todo, msg) {
  if (!isDesktopRuntime()) return false;
  try {
    await window.desktopBridge.notifyReminder({
      id: todo.id,
      title: todo.title,
      dueDate: todo.dueDate,
      message: msg,
    });
    return true;
  } catch {
    return false;
  }
}
async function checkReminders() {
  try {
    const upcoming = await api('/api/todos/upcoming');
    for (const t of upcoming) {
      if (S.notified.has(t.id)) continue;
      S.notified.add(t.id);
      const due = new Date(t.dueDate);
      const diff = Math.round((due - new Date()) / 60000);
      const msg = diff > 0 ? `${diff} 分钟后到期` : '已到期！';
      const sentToDesktop = await pushReminderToDesktop(t, msg);
      if (!sentToDesktop) {
        toast(`⏰ ${t.title}`, msg, 'warning');
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification('⏰ 待办提醒', { body: `${t.title}\n${msg}` });
        }
      }
    }
  } catch {}
  updateBell();
}
function updateBell() {
  const now = new Date();
  const cnt = S.todos.filter(t => !t.completed && t.dueDate && new Date(t.dueDate) < now && !t.parentId).length;
  const badge = document.getElementById('bell-badge');
  if (badge) { badge.textContent = cnt > 9 ? '9+' : cnt; badge.classList.toggle('show', cnt > 0); }
}
async function onBellClick() {
  const ov = S.todos.filter(t => !t.completed && t.dueDate && new Date(t.dueDate) < new Date() && !t.parentId);
  if (!ov.length) return;
  if (isDesktopRuntime()) {
    for (const todo of ov.slice(0, 5)) {
      await pushReminderToDesktop(todo, '已逾期');
    }
    return;
  }
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().then(p => { if (p==='granted') toast('系统通知已开启', '', 'success'); });
  }
  toast(`${ov.length} 个已逾期`, ov.slice(0,3).map(t=>t.title).join('、'), 'error');
}

// ===== TOAST =====
function toast(title, body='', type='info') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="toast-title">${esc(title)}</div>${body?`<div class="toast-body">${esc(body)}</div>`:''}`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ===== UTILS =====
function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function toInputDT(d) { return `${dateStr(d)}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function fmtDate(d) { return d.toLocaleString('zh-CN', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }
function relTime(d) { const m = Math.abs(Math.round((new Date()-d)/60000)); return m<60?`${m}分钟`:m<1440?`${Math.round(m/60)}小时`:`${Math.round(m/1440)}天`; }
function extractLinks(txt) { return [...new Set((txt.match(/https?:\/\/[^\s\]\)\>"']+/g) || []))]; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== INIT =====
async function init() {
  restoreUiState();
  await loadTodos();
  syncPaneTitle();
  setView(S.view || 'list');
  if (!isDesktopRuntime() && 'Notification' in window && Notification.permission === 'default') {
    setTimeout(() => Notification.requestPermission(), 2000);
  }
  checkReminders();
  setInterval(checkReminders, 60000);
  setInterval(loadTodos, 30000);
  initFloatingBtnState();
}
init();
</script>
